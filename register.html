<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MarketGame's</title>
    <style>
        body {
            background-image: url('image.jpg');
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            color: #ccc;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 0;
        }
        .reg-box {
            background: rgba(0, 0, 0, 0.8);
            padding: 30px 40px;
            border-radius: 15px;
            width: 380px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        h1 { text-align: center; color: #fff; margin-bottom: 25px; }
        .form-group { margin-bottom: 12px; display: flex; flex-direction: column; }
        label { margin-bottom: 5px; font-size: 14px; color: #aaa; }
        input {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #444;
            background: #222;
            color: #fff;
            outline: none;
        }
        input:focus { border-color: #28a745; }
        .button-row { display: flex; justify-content: space-between; margin-top: 20px; }
        button { padding: 10px 20px; border: none; border-radius: 5px; background-color: #444; color: white; cursor: pointer; }
        .btn-main { background-color: #28a745; font-weight: bold; }
    </style>
</head>
<body>

<div class="reg-box">
    <h1>Регистрация</h1>

    <form id="registerForm">

        <div class="form-group">
            <label>Email:</label>
            <input type="email" id="email" required>
        </div>

        <div class="form-group">
            <label>Фамилия:</label>
            <input type="text" id="lastName" required>
        </div>

        <div class="form-group">
            <label>Имя:</label>
            <input type="text" id="firstName" required>
        </div>

        <div class="form-group">
            <label>Дата рождения:</label>
            <input type="date" id="birthDate" required>
        </div>

        <div class="form-group">
            <label>Номер телефона:</label>
            <input type="tel" id="phone" required>
        </div>

        <div class="form-group">
            <label>Пароль:</label>
            <input type="password" id="password" required>
        </div>

        <div class="form-group">
            <label>Повторите пароль:</label>
            <input type="password" id="passwordRepeat" required>
        </div>

        <label>
            <input type="checkbox" required>
            Я согласен с <a href="privacy.html" target="_blank">политикой обработки персональных данных</a>
        </label>

        <div class="button-row">
            <button type="button" onclick="window.location.href='login.html'">Назад</button>
            <button type="submit" class="btn-main">Создать аккаунт</button>
        </div>

    </form>
</div>

<script>
document.getElementById("registerForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const password = document.getElementById("password").value;
    const passwordRepeat = document.getElementById("passwordRepeat").value;

    if (password !== passwordRepeat) {
        alert("Пароли не совпадают");
        return;
    }

    const user = {
        email: document.getElementById("email").value,
        lastName: document.getElementById("lastName").value,
        firstName: document.getElementById("firstName").value,
        birthDate: document.getElementById("birthDate").value,
        phone: document.getElementById("phone").value,
        password: password
    };

    // Сохраняем пользователя
    localStorage.setItem("user", JSON.stringify(user));
    
    // ВАЖНО: Автоматически входим после регистрации
    localStorage.setItem("isLoggedIn", "true");
    localStorage.setItem("currentUser", JSON.stringify(user));
    localStorage.setItem("username", user.firstName || user.email);

    alert("Регистрация успешна! Вы автоматически вошли в аккаунт.");
    window.location.href = "Adam.html"; // Ведем на главную страницу
});
</script>

</body>
</html>
