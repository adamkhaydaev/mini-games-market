<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MarketGame's - Вход</title>
    <style>
        body {
            background-image: url('image.jpg');
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            color: #ccc;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-box {
            background-color: rgba(0,0,0,0.8);
            padding: 40px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        h1 { text-align: center; color: #fff; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        label { margin-bottom: 5px; font-size: 14px; }
        input { padding: 10px; border-radius: 5px; border: 1px solid #444; background: #222; color: #fff; outline: none;}
        input:focus { border-color: #007bff; }
        .button-row { display: flex; justify-content: space-between; margin-top: 20px; }
        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 5px; background-color: #444; color: white; transition: 0.3s;}
        button:hover { background-color: #666; }
        .btn-login { background-color: #007bff; font-weight: bold; }
        .btn-login:hover {background-color: #0056b3; }
    </style>
</head>
<body>

<div class="login-box">
    <h1>Вход</h1>
    <form id="loginForm">
        <div class="form-group">
            <label>Email:</label>
            <input type="email" id="loginEmail" placeholder="example@mail.ru" required>
        </div>
        <div class="form-group">
            <label>Пароль:</label>
            <input type="password" id="loginPassword" placeholder="********" required>
        </div>
        <div class="button-row">
            <button type="button" onclick="window.location.href='register.html'">Регистрация</button>
            <button type="submit" class="btn-login">Войти</button>
        </div>
    </form>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();

    const email = document.getElementById("loginEmail").value;
    const password = document.getElementById("loginPassword").value;

    // Получаем пользователя из localStorage
    const user = JSON.parse(localStorage.getItem("user"));

    if(user && user.email === email && user.password === password){
        // ВАЖНО: Устанавливаем флаги авторизации
        localStorage.setItem("isLoggedIn", "true");
        localStorage.setItem("currentUser", JSON.stringify(user));
        localStorage.setItem("username", user.firstName || user.email);
        
        alert("Вход выполнен успешно!");
        window.location.href = "Adam.html"; // Ведем на главную страницу
    } else {
        alert("Неверный email или пароль!");
    }
});
</script>

</body>
</html>
