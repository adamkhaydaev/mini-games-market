<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MarketGame's - Admin Panel</title>
    <style>
        :root { --bg-color: #1a1a1a; --card-bg: #222; --text-color: #ffffff; --input-bg: #333; --border-color: #444; --accent-color: #ff0000; }
        body.light { --bg-color: #f0f2f5; --card-bg: #ffffff; --text-color: #1a1a1a; --input-bg: #ffffff; --border-color: #ddd; --accent-color: #cc0000; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; transition: 0.3s; }
        .admin-container { max-width: 1000px; margin: 0 auto; background: var(--card-bg); padding: 30px; border-radius: 15px; border: 1px solid var(--border-color); box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        .section-title { border-bottom: 2px solid var(--accent-color); padding-bottom: 10px; margin: 40px 0 20px; text-transform: uppercase; font-size: 18px; color: var(--accent-color); font-weight: bold; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
        .full-width { grid-column: span 2; }
        label { font-size: 12px; color: #888; font-weight: bold; text-transform: uppercase; }
        input, textarea { padding: 10px; border-radius: 6px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-color); outline: none; transition: 0.3s; }
        input:focus, textarea:focus { border-color: var(--accent-color); }
        textarea { height: 80px; resize: vertical; }
        .preview-box { width: 100%; height: 200px; border: 2px dashed var(--border-color); border-radius: 8px; overflow: hidden; margin-top: 10px; display: flex; align-items: center; justify-content: center; background: #111; }
        .preview-box img { width: 100%; height: 100%; object-fit: cover; }
        .btn-add { background: var(--accent-color); color: white; border: none; padding: 18px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 18px; margin-top: 20px; transition: 0.3s; text-transform: uppercase; }
        .btn-add:hover { opacity: 0.9; transform: translateY(-2px); }
        .data-item { display: flex; align-items: center; justify-content: space-between; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 8px; margin-top: 10px; border: 1px solid var(--border-color); }
        .btn-del { background: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-del:hover { background: #a71d2a; }
        .user-info b { color: var(--accent-color); }
    </style>
</head>
<body>
    <div class="admin-container">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <a href="dashboard.html" style="color: #888; text-decoration: none; font-size: 14px;">← Назад в профиль</a>
            <span style="font-size: 12px; color: var(--accent-color); font-weight: bold;">ADMIN MODE: adamfadim46</span>
        </div>

        <h2 class="section-title">Добавление игры в магазин</h2>
        <form id="adminForm">
            <div class="form-grid">
                <div class="form-group"><label>Название игры:</label><input type="text" id="gTitle" required></div>
                <div class="form-group"><label>Цена (₽):</label><input type="number" id="gPrice" required></div>
                <div class="form-group">
                    <label>Обложка игры:</label>
                    <input type="file" id="fileInput" accept="image/*">
                    <div class="preview-box"><img id="imgPreview" style="display:none"></div>
                </div>
                <div class="form-group">
                    <label>Жанр:</label><input type="text" id="gGenre" placeholder="Action, RPG" required>
                    <label style="margin-top:10px">Разработчик:</label><input type="text" id="gDev" placeholder="Ubisoft" required>
                </div>
                <div class="form-group full-width"><label>Описание (Об игре):</label><textarea id="gDesc"></textarea></div>
                <div class="form-group full-width"><label>Особенности издания (каждая с новой строки):</label><textarea id="gFeatures" placeholder="Бонусные скины&#10;Саундтрек"></textarea></div>
                <div class="form-group full-width"><label>Преимущества у кнопки (каждое с новой строки):</label><textarea id="gBenefits" placeholder="Мгновенная доставка&#10;Лицензионный ключ"></textarea></div>
                
                <div class="form-group"><label>ОС:</label><input type="text" id="sOS" placeholder="Windows 10"></div>
                <div class="form-group"><label>Процессор:</label><input type="text" id="sCPU" placeholder="Intel Core i5"></div>
                <div class="form-group"><label>Видеокарта:</label><input type="text" id="sGPU" placeholder="NVIDIA GTX 1060"></div>
                <div class="form-group"><label>Видеопамять:</label><input type="text" id="sVRAM" placeholder="6 GB"></div>
                <div class="form-group"><label>Оперативная память:</label><input type="text" id="sRAM" placeholder="16 GB"></div>
                <div class="form-group"><label>Место на диске:</label><input type="text" id="sHDD" placeholder="50 GB"></div>
            </div>
            <button type="button" class="btn-add" id="saveBtn">Опубликовать на сайт</button>
        </form>

        <h2 class="section-title">Список всех игр</h2>
        <div id="gameList"></div>

        <h2 class="section-title">Пользователи (Лимит: 5 человек)</h2>
        <div id="userList"></div>
    </div>

    <script>
    if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');

    const current = JSON.parse(localStorage.getItem('currentUser'));
    if (!current || current.email !== "adamfadim46@gmail.com") {
        alert("Доступ закрыт! Только для администратора.");
        window.location.href = 'Adam.html';
    }

    let base64Img = "";
    const fileInput = document.getElementById('fileInput');
    const imgPreview = document.getElementById('imgPreview');

    fileInput.onchange = function() {
        if (this.files && this.files[0]) {
            const reader = new FileReader();
            reader.onload = e => { imgPreview.src = e.target.result; imgPreview.style.display = 'block'; base64Img = e.target.result; };
            reader.readAsDataURL(this.files[0]);
        }
    };

    document.getElementById('saveBtn').onclick = function() {
        const title = document.getElementById('gTitle').value;
        if(!title || !base64Img) return alert("Нужно название и фото!");

        const newGame = {
            id: Date.now(),
            title: title,
            price: document.getElementById('gPrice').value,
            genre: document.getElementById('gGenre').value,
            developer: document.getElementById('gDev').value,
            desc: document.getElementById('gDesc').value,
            features: document.getElementById('gFeatures').value,
            benefits: document.getElementById('gBenefits').value,
            image: base64Img,
            specs: {
                os: document.getElementById('sOS').value,
                cpu: document.getElementById('sCPU').value,
                gpu: document.getElementById('sGPU').value,
                vram: document.getElementById('sVRAM').value,
                ram: document.getElementById('sRAM').value,
                hdd: document.getElementById('sHDD').value
            }
        };

        const games = JSON.parse(localStorage.getItem('adminGames')) || [];
        games.push(newGame);
        localStorage.setItem('adminGames', JSON.stringify(games));
        alert("Игра успешно добавлена!");
        location.reload();
    };

    function renderAll() {
        const games = JSON.parse(localStorage.getItem('adminGames')) || [];
        document.getElementById('gameList').innerHTML = games.length ? games.map(g => `
            <div class="data-item">
                <span><b>${g.title}</b> — ${g.price} ₽</span>
                <button class="btn-del" onclick="delGame(${g.id})">Удалить</button>
            </div>
        `).join('') : '<p style="opacity:0.5">Игр пока нет...</p>';

        const users = JSON.parse(localStorage.getItem('allUsers')) || [];
        document.getElementById('userList').innerHTML = users.length ? users.map(u => `
            <div class="data-item">
                <div class="user-info">
                    <b>${u.name} ${u.surname}</b><br>
                    <small>${u.email} | ${u.phone}</small>
                </div>
                ${u.email === 'adamfadim46@gmail.com' ? '<span>(Это вы)</span>' : `<button class="btn-del" onclick="delUser('${u.email}')">Удалить</button>`}
            </div>
        `).join('') : '<p style="opacity:0.5">Других пользователей нет.</p>';
    }

    window.delGame = id => {
        if(confirm("Удалить эту игру?")) {
            let gs = JSON.parse(localStorage.getItem('adminGames'));
            localStorage.setItem('adminGames', JSON.stringify(gs.filter(g => g.id !== id)));
            renderAll();
        }
    };

    window.delUser = email => {
        if(confirm(`Удалить пользователя ${email}?`)) {
            let us = JSON.parse(localStorage.getItem('allUsers'));
            localStorage.setItem('allUsers', JSON.stringify(us.filter(u => u.email !== email)));
            renderAll();
        }
    };

    renderAll();
    </script>
</body>
</html>
